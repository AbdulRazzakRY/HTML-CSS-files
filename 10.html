<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Input Elements</title>
    </head>
    <body>
        <center>

        
        <p>
            Application for Drivers licence
        </p>
        <br>
        <form method="post">
            Name:
                <input type="text" required="required" pattern="[A-Za-z]">
                <br>
            Age : 
            <input type="number" required>
            <br>
            Address : 
            <input type="text" maxlength="30" required> <br>
            Cont No. <input type="number" maxlength="10" minlength="10"> <br>
            
                I own an expired driver's license.<br>
                <input type="submit">
        </form>
        </center>
    </body>
</html>
