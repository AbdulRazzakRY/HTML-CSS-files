<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Registration Form</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
    </head>
    <body>
        <center>
        <h3> Customer Registration Form</h3>
        <form name="custForm" style="text-align: center;">
        
        <div>
        <label for="name">User Name: </label>
        <input type="text" name="name" placeholder="Enter User Name" required="requried" autofocus="autofocus"
        </div>
        <br>
        <label for="password"> Password: </label>
        <input type="password" minlength="8" maxlength="12" name="password" required="requried" pattern="^[a-zA-Z]+$(0-9)" >
        <br>
        <label for="email">Email id: </label>
        <input type="email" name="email" >
        <br>
        <label for="gender">Gender: </label>
        <input type="radio" value="male" required="requried" name="gender">Male
        <input type="radio" value="female" name="gender" required="requried">Female
        <input type="radio" value="other" name="gender" required="requried">Other
        <br>
        <label for="age">Age: </label>
        <input type="number" name="age" min="12" max="60" required="requried">
        <br>
        <label for="address">Address: </label>
        <textarea rows="4" cols="20" maxlength="100"></textarea>
        <br>
        <!-- Company Website URL Validation -->
        <label for="companyWebsite">Company Website: </label><br>
        <input type="url" id="companyWebsite" name="companyWebsite" placeholder="https://example.com" required>
        <br><br>

        <!-- Country Dropdown Selection -->
        <label for="country">Choose Country: </label><br>
        <select id="country" name="country" required>
            <option value="">--Select--</option>
            <option value="India">India</option>
            <option value="United States">United States</option>
            <option value="Germany">Germany</option>
            <option value="Japan">Japan</option>
        </select>
        <br><br>

        <label for="Date of Journey: ">Date of Journey</label>
        <input type="date" required>

        <!-- Submit and Reset Buttons -->
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        
       
        </form>
    </center>
    </body>
</html>
